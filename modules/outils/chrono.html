<!-- 📄 Fichier : modules/outils/chrono.html -->
<!-- 🎯 Rôle : Structure HTML du module chronomètre -->

<div class="chrono-module">

  <!-- Sélecteur de mode -->
  <div class="chrono-mode-selector">
    <button class="chrono-mode-btn actif" data-mode="simple">
      ⏱️ Chrono Simple
    </button>
    <button class="chrono-mode-btn" data-mode="multi">
      ⏱️ Multi-Chrono
    </button>
  </div>

  <!-- Zone principale : contenu injecté dynamiquement -->
  <div class="chrono-zone" id="chrono-zone"></div>

</div>
