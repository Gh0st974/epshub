<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2ecc71" />
  <title>EPS Hub</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- ===== HEADER FIXE ===== -->
  <header class="app-header">
    <span class="header-logo"><strong>EPS</strong> Hub</span>
  </header>

  <!-- ===== ZONE PRINCIPALE (modules injectés ici) ===== -->
  <main id="app-main" class="app-main">
    <!-- Le contenu des modules est chargé dynamiquement -->
  </main>

  <!-- ===== BARRE DE NAVIGATION BAS ===== -->
  <nav class="app-nav">
    <button class="nav-btn active" data-module="hub">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Hub</span>
    </button>
    <button class="nav-btn" data-module="groupes">
      <span class="nav-icon">👥</span>
      <span class="nav-label">Groupes</span>
    </button>

    <!-- Bouton central recherche -->
    <button class="nav-btn nav-btn--center" data-module="recherche">
      <span class="nav-icon">🔍</span>
    </button>

    <button class="nav-btn" data-module="outils">
      <span class="nav-icon">🔧</span>
      <span class="nav-label">Outils</span>
    </button>
    <button class="nav-btn" data-module="parametres">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Paramètres</span>
    </button>
  </nav>

  <!-- Scripts -->
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
