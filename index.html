<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2ecc71" />
  <title>EPSHub</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />

  <!-- ═══════════════════════════════════════
       CSS — SOCLE
  ═══════════════════════════════════════ -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <!-- ═══════════════════════════════════════
       CSS — COMPOSANTS PRINCIPAUX
  ═══════════════════════════════════════ -->
  <link rel="stylesheet" href="css/components/hub.css" />

  <!-- ═══════════════════════════════════════
       CSS — MODULES OUTILS
       👉 Ajouter ici le CSS de chaque outil
  ═══════════════════════════════════════ -->
  <link rel="stylesheet" href="css/components/chrono.css" />
  <link rel="stylesheet" href="css/components/scoreboard.css" />
  <!-- <link rel="stylesheet" href="css/components/minuteur.css" /> -->
  <!-- <link rel="stylesheet" href="css/components/equipes.css" /> -->

  <!-- ═══════════════════════════════════════
       CSS — MODULES CA (Champs d'apprentissage)
       👉 Ajouter ici le CSS de chaque CA
  ═══════════════════════════════════════ -->
  <!-- <link rel="stylesheet" href="css/components/natation.css" /> -->
  <!-- <link rel="stylesheet" href="css/components/escalade.css" /> -->

</head>
<body>

  <!-- ╔═══════════════════════════════════════╗
       ║           APPLICATION                 ║
       ╚═══════════════════════════════════════╝ -->
  <div id="app">


    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         VUE — HUB (accueil principal)
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <div id="vue-hub" class="vue active">

      <header class="hub-header">
        <div class="hub-header__badge">
          <span class="hub-header__titre"><strong>EPS</strong> Hub</span>
          <span class="hub-header__message">Welcome back !</span>
        </div>
      </header>

      <section class="hub-section">
        <h2 class="hub-section__titre">Champs d'apprentissage</h2>
        <div class="hub-grille" id="grille-ca">
          <!-- Généré par ui.js -->
        </div>
      </section>

      <section class="hub-section">
        <h2 class="hub-section__titre">Les outils indispensables</h2>
        <div class="hub-grille" id="grille-outils">
          <!-- Généré par ui.js -->
        </div>
      </section>

    </div><!-- ━━━ fin vue-hub ━━━ -->


    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         VUE — NAVBAR : RECHERCHE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <div id="vue-recherche" class="vue">
      <div class="recherche-container">
        <input
          type="search"
          id="input-recherche"
          class="recherche-input"
          placeholder="Rechercher un module..."
          autocomplete="off"
        />
        <div id="resultats-recherche" class="recherche-resultats"></div>
      </div>
    </div><!-- ━━━ fin vue-recherche ━━━ -->


    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         VUE — NAVBAR : GROUPES
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <div id="vue-groupes" class="vue">
      <p class="vue-placeholder">👥 Groupes — bientôt disponible</p>
    </div><!-- ━━━ fin vue-groupes ━━━ -->


    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         VUE — NAVBAR : OUTILS (liste des outils)
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <div id="vue-outils" class="vue">

      <header class="hub-header">
        <div class="hub-header__badge">
          <span class="hub-header__titre">🛠️ <strong>Outils</strong></span>
          <span class="hub-header__message">Outils transversaux</span>
        </div>
      </header>

      <section class="hub-section">
        <div class="hub-grille" id="grille-outils-vue">
          <!-- Généré par ui.js -->
        </div>
      </section>

    </div><!-- ━━━ fin vue-outils ━━━ -->


    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         VUE — NAVBAR : PARAMÈTRES
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <div id="vue-parametres" class="vue">
      <p class="vue-placeholder">⚙️ Paramètres — bientôt disponible</p>
    </div><!-- ━━━ fin vue-parametres ━━━ -->


    <!-- ════════════════════════════════════════
         MODULES — OUTILS
         👉 Ajouter chaque outil ici
    ════════════════════════════════════════ -->

    <!-- ┌─────────────────────────────────────┐
         │  OUTIL : CHRONOMÈTRE               │
         └─────────────────────────────────────┘ -->
    <div id="vue-chrono" class="vue">

      <div class="chrono-header">
        <button class="chrono-header__retour" id="btn-retour-chrono">←</button>
        <h1 class="chrono-header__titre">⏱️ Chronomètre</h1>
      </div>

      <div class="chrono-onglets">
        <button class="chrono-onglet active" data-mode="simple" id="onglet-simple">⏱️ Simple</button>
        <button class="chrono-onglet" data-mode="multi" id="onglet-multi">👥 Multi</button>
      </div>

      <div id="chrono-contenu"></div>

    </div><!-- ━━━ fin vue-chrono ━━━ -->


    <!-- ┌─────────────────────────────────────┐
         │  OUTIL : SCOREBOARD                │
         └─────────────────────────────────────┘ -->
    <div id="vue-scoreboard" class="vue">

      <div class="chrono-header">
        <button class="chrono-header__retour" id="btn-retour-scoreboard">←</button>
        <h1 class="chrono-header__titre">🏆 Scoreboard</h1>
      </div>

      <div id="scoreboard-conteneur"></div>

    </div><!-- ━━━ fin vue-scoreboard ━━━ -->


    <!-- ┌─────────────────────────────────────┐
         │  OUTIL : MINUTEUR (à venir)        │
         └─────────────────────────────────────┘ -->
    <!--
    <div id="vue-minuteur" class="vue">
      <div id="minuteur-conteneur"></div>
    </div>
    -->


    <!-- ┌─────────────────────────────────────┐
         │  OUTIL : ÉQUIPES (à venir)         │
         └─────────────────────────────────────┘ -->
    <!--
    <div id="vue-equipes" class="vue">
      <div id="equipes-conteneur"></div>
    </div>
    -->


    <!-- ════════════════════════════════════════
         MODULES — CHAMPS D'APPRENTISSAGE (CA)
         👉 Ajouter chaque CA ici
    ════════════════════════════════════════ -->

    <!-- ┌─────────────────────────────────────┐
         │  CA1 : NATATION (à venir)          │
         └─────────────────────────────────────┘ -->
    <!--
    <div id="vue-natation" class="vue">
      <div id="natation-conteneur"></div>
    </div>
    -->


  </div><!-- ╚═══ fin app ═══╝ -->


  <!-- ╔═══════════════════════════════════════╗
       ║              NAVBAR                   ║
       ╚═══════════════════════════════════════╝ -->
  <nav class="navbar" id="navbar">
    <button class="navbar__btn active" data-vue="vue-hub">
      <span class="navbar__icone">🏠</span>
      <span class="navbar__label">Hub</span>
    </button>
    <button class="navbar__btn" data-vue="vue-groupes">
      <span class="navbar__icone">👥</span>
      <span class="navbar__label">Groupes</span>
    </button>
    <button class="navbar__btn navbar__btn--central" data-vue="vue-recherche">
      <span class="navbar__icone-central">🔍</span>
    </button>
    <button class="navbar__btn" data-vue="vue-outils">
      <span class="navbar__icone">🛠️</span>
      <span class="navbar__label">Outils</span>
    </button>
    <button class="navbar__btn" data-vue="vue-parametres">
      <span class="navbar__icone">⚙️</span>
      <span class="navbar__label">Paramètres</span>
    </button>
  </nav>


  <!-- ╔═══════════════════════════════════════╗
       ║           SCRIPTS JS                  ║
       ╚═══════════════════════════════════════╝ -->

  <!-- Socle -->
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/storage.js"></script>

  <!-- ═══════════════════════════════════════
       MODULES — OUTILS
       👉 Ajouter les scripts de chaque outil ici
  ═══════════════════════════════════════ -->
  <script src="js/modules/outils/chrono/chrono.js"></script>
  <script src="js/modules/outils/chrono/chrono-ui.js"></script>
  <script src="js/modules/outils/chrono/chrono-events.js"></script>

  <script src="js/modules/outils/scoreboard/scoreboard.js"></script>
  <script src="js/modules/outils/scoreboard/scoreboard-ui.js"></script>
  <script src="js/modules/outils/scoreboard/scoreboard-timer.js"></script>
  <script type="module" src="...scoreboard-events.js"></script>

  <!-- <script src="js/modules/outils/minuteur/minuteur.js"></script> -->

  <!-- ═══════════════════════════════════════
       MODULES — CHAMPS D'APPRENTISSAGE

  <!-- Routeur & init (toujours en dernier) -->
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
