<!-- 📄 Fichier : modules/outils/scoreboard.html -->
<!-- 🎯 Rôle : Structure HTML du module scoreboard -->

<div class="sb-container">

  <!-- ═══ BARRE TOP ═══ -->
  <div class="sb-barre-top">
    <div class="sb-pastilles" id="sb-pastilles"></div>
    <div class="sb-timer-affichage" id="sb-timer-affichage">
      <span id="sb-timer-texte">05:00</span>
    </div>
    <div class="sb-timer-controles">
      <button class="sb-timer-btn" id="sb-timer-play">▶</button>
      <button class="sb-timer-btn" id="sb-timer-pause">⏸</button>
      <button class="sb-timer-btn" id="sb-timer-reset">↺</button>
    </div>
    <button class="sb-btn-suivante" id="sb-btn-suivante">Suivante ▶</button>
  </div>

  <!-- ═══ GRILLE ÉQUIPES ═══ -->
  <div class="sb-grille" id="sb-grille"></div>

  <!-- ═══ ACTIONS GLOBALES ═══ -->
  <div class="sb-actions-globales">
    <button class="sb-btn-reset-global" id="sb-btn-reset-global">↺ tout reset</button>
  </div>

  <!-- ═══ ACCORDÉON CONFIG ═══ -->
  <div class="sb-config-wrapper">
    <button class="sb-config-header" id="sb-config-header" aria-expanded="false">
      <span>⚙️ CONFIGURATION</span>
      <span class="sb-config-chevron" id="sb-config-chevron">▲</span>
    </button>
    <div class="sb-config-corps" id="sb-config-corps" hidden>

      <div class="sb-config-groupe">
        <label class="sb-config-label">Nombre d'équipes</label>
        <div class="sb-stepper">
          <button class="sb-stepper-btn" id="sb-equipes-moins">−</button>
          <span class="sb-stepper-val" id="sb-equipes-val">2</span>
          <button class="sb-stepper-btn" id="sb-equipes-plus">+</button>
        </div>
      </div>

      <div class="sb-config-groupe">
        <label class="sb-config-label">Noms des équipes</label>
        <div id="sb-noms-equipes"></div>
      </div>

      <div class="sb-config-groupe">
        <label class="sb-config-label">Nombre de sets</label>
        <div class="sb-stepper">
          <button class="sb-stepper-btn" id="sb-sets-moins">−</button>
          <span class="sb-stepper-val" id="sb-sets-val">3</span>
          <button class="sb-stepper-btn" id="sb-sets-plus">+</button>
        </div>
      </div>

      <div class="sb-config-groupe">
        <label class="sb-config-label">Boutons de score rapide</label>
        <div id="sb-bonus-liste"></div>
        <button class="sb-btn-ajouter-bonus" id="sb-btn-ajouter-bonus">+</button>
      </div>

      <button class="sb-btn-valider-config" id="sb-btn-valider-config">✅ APPLIQUER</button>
    </div>
  </div>

  <!-- ═══ MODAL TIMER ═══ -->
  <div class="sb-modal-overlay" id="sb-modal-timer" hidden>
    <div class="sb-modal-boite">
      <h3 class="sb-modal-titre">⏱ Configurer le timer</h3>
      <div class="sb-modal-champs">
        <label class="sb-modal-label">Minutes
          <input type="number" id="sb-input-min" class="sb-modal-input" min="0" max="99" value="5">
        </label>
        <span class="sb-modal-sep">:</span>
        <label class="sb-modal-label">Secondes
          <input type="number" id="sb-input-sec" class="sb-modal-input" min="0" max="59" value="0">
        </label>
      </div>
      <div class="sb-modal-actions">
        <button class="sb-modal-btn-annuler" id="sb-timer-annuler">Annuler</button>
        <button class="sb-modal-btn-valider" id="sb-timer-valider">Valider</button>
      </div>
    </div>
  </div>

  <!-- ═══ MODAL CONFIRM SET ═══ -->
  <div class="sb-modal-overlay" id="sb-modal-confirm" hidden>
    <div class="sb-modal-boite">
      <h3 class="sb-modal-titre">⚠️ Changer de set ?</h3>
      <p class="sb-modal-texte" id="sb-confirm-texte"></p>
      <div class="sb-modal-actions">
        <button class="sb-modal-btn-annuler" id="sb-confirm-non">Annuler</button>
        <button class="sb-modal-btn-valider" id="sb-confirm-oui">Confirmer</button>
      </div>
    </div>
  </div>

</div>
