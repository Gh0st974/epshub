<!-- 📄 Fichier : modules/scoreboard.html -->
<!-- 🎯 Rôle : Structure du scoreboard — jeu + modale config -->

<div id="scoreboard-root">

  <!-- ── Barre de période ── -->
  <div id="scoreboard-periode-bar" hidden>
    <span id="scoreboard-periode-label"></span>
    <button id="scoreboard-btn-periode-suivante" class="scoreboard-btn-action">
      Période suivante →
    </button>
  </div>

  <!-- ── Barre d'actions ── -->
  <div id="scoreboard-actions-bar">
    <button id="scoreboard-btn-config" class="scoreboard-btn-action">
      ⚙️ Configurer
    </button>
    <button id="scoreboard-btn-reset" class="scoreboard-btn-action scoreboard-btn-danger">
      🔄 Reset
    </button>
  </div>

  <!-- ── Zone des équipes ── -->
  <div id="scoreboard-equipes"></div>

  <!-- ══════════════════════════════════════════ -->
  <!-- MODALE CONFIGURATION                       -->
  <!-- ══════════════════════════════════════════ -->
  <div id="scoreboard-config-overlay" hidden>
    <div id="scoreboard-config-modale">

      <!-- En-tête -->
      <div class="scoreboard-config-header">
        <h2>⚙️ Configuration</h2>
        <button id="scoreboard-btn-fermer-config" aria-label="Fermer">✕</button>
      </div>

      <!-- Section équipes -->
      <section class="scoreboard-config-section">
        <h3>Équipes</h3>
        <div id="scoreboard-config-equipes-liste"></div>
        <button id="scoreboard-btn-ajouter-equipe" class="scoreboard-btn-ajouter">
          + Ajouter une équipe
        </button>
      </section>

      <!-- Section bonus -->
      <section class="scoreboard-config-section">
        <h3>Points bonus</h3>
        <div id="scoreboard-config-bonus-liste"></div>
        <button id="scoreboard-btn-ajouter-bonus" class="scoreboard-btn-ajouter">
          + Ajouter un bonus
        </button>
      </section>

      <!-- Section périodes -->
      <section class="scoreboard-config-section">
        <h3>Périodes</h3>
        <label class="scoreboard-config-toggle">
          <input type="checkbox" id="scoreboard-config-periodes-actives">
          Activer les périodes
        </label>
        <div id="scoreboard-config-periodes-detail" hidden>
          <label>
            Nombre de périodes
            <input type="number" id="scoreboard-config-nb-periodes"
                   min="2" max="10" value="2">
          </label>
          <label>
            Nom des périodes
            <input type="text" id="scoreboard-config-nom-periode"
                   placeholder="Ex : Mi-temps, Quart..." maxlength="20">
          </label>
        </div>
      </section>

      <!-- Bouton valider -->
      <button id="scoreboard-btn-valider-config" class="scoreboard-btn-valider">
        ✅ Valider
      </button>

    </div>
  </div>

</div>
